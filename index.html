<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <title>Infinity VR Loop</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link rel="stylesheet" href="style.css" />
  <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
</head>

<body>
  <div id="hud">
    <div id="status">Lade Panorama...</div>
    <div id="hint">Drehe dich um 180°, um die Welt zu wechseln</div>
  </div>

  <a-scene>
    <a-sky id="sky" color="#000"></a-sky>

    <a-camera
      id="camera"
      position="0 1.6 0"
      look-controls
      wasd-controls
      turn-detector>
    </a-camera>
  </a-scene>

  <script src="script.js"></script>
</body>
</html>
